<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms</title>
</head>
<body>
    <h1>Forms in HTML.</h1>
    <form action="url" method="GET" accept-charset="UTF-8" autocomplete="off" enctype="application/x-www-form-urlencoded">
        <label for="fname">First name</label>
        <input type="text" placeholder="First name" name="" id="fname">
        <br>
        <label for="lname">Last name name</label>
        <input type="text" placeholder="Last name" name="" id="lname">
        <br>
        <button type="submit"  >submit</button>
    </form>
    
</body>
</html>

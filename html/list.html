<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>listes</title>
</head>
<body>
    <h1>My Lists</h1>
    <h2>unordered list</h2>
    <ul>
        <li>1</li>
        <ol>
            <li>h.1</li>
            <li>h.2</li>
        </ol>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
        <li>6</li>
    </ul>
    <h2>ordered lists</h2>
    <ol type="a">
        <li>one</li>
        <li>two</li>
        <li>three</li>
        <li>four</li>
        <li>five</li>
        <li>six</li>
    </ol>
    <dl>
        <dt>i like coofee</dt>
        <dd>i like coldrink</dd>
        <dt>hot tea</dt>
        <dd>hot lemon tea</dd>
    </dl>
</body>
</html>

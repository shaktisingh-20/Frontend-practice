<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forms</title>
</head>
<body>
    <h1>Forms in HTML.</h1>
    <form action="url" method="GET" accept-charset="UTF-8" autocomplete="off" enctype="application/x-www-form-urlencoded">
        <label for="fname">First name</label>
        <input type="text" placeholder="First name" name="fname" id="fname">
        <br>
        <label for="lname">Last name</label>
        <input type="text" placeholder="Last name" name="lname" id="lname" value="hitesh">
        <br>
        <label for="pwd">Password</label>
        <input type="password" name="pwd" id="pwd">
        <br>
        <input type="reset" value="reset">
        <input type="week" name="week" id="week">
        <br>
        <select name="editors" id="editors">
            <option value="vscode">vscode</option>
            <option value="sublime">sublime</option>
            <option value="intellij">intellij</option>
        </select>
        <br>
        <div>
            <label for="volume">Volume</label>
            <input type="range" name="volume" id="volume" min="0" max="100">
        </div>
        <br>
        <button type="submit">submit</button>
    </form>
</body>
</html>

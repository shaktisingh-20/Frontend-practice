<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Desing</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
        }
        .responsive-div{
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            color: cornsilk;
            font-size: 26px;
            background-color: rgb(225, 31, 215);
        }
        @media (max-width: 600px) and (max-width:1024px){
            body{
                align-items: flex-start;
            }
            .responsive-div{
                background-color: #3498db;
            }
        }
        @media (min-width:601px){
            body{
                align-items: center;
            }
            .responsive-div{
                background-color: #c62808;
            }
        }
        
    </style>
</head>
<body>
    <div class="responsive-div">
        this div changes color based on the screen
    </div>
</body>
</html>

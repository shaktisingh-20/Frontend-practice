<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #010e10;
        }
        
        .nav-container{
            margin: 40px;
        }
        .nav3{
            background-color: #51c6ea;
            padding: 10px;
        }
        .nav3 ul{
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .nav3 a {
            text-decoration: none;
            color: #fff;
            padding: 10px;
            display: block;
        }
        .nav3 .dropdown-content{
            display: none;
            border: 1px solid;
            border-radius: 8px;
        }

        .nav3 .dropdown:hover .dropdown-content{
            display: block;
            position:absolute;
            background-color: #201e1e;
            color: cornsilk;
            min-width: 150px;
        }
        .nav3 .login-btn{
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 8px;
        }
        .nav3 .login-btn:hover{
            background-color: #0870ac;
            color: aliceblue;
        }
        
    </style>
</head>
<body>
    <div class="nav-container">
        <nav class="nav3">
            <ul>
                <li><a href="#">Home</a>
                </li>
                <li class="dropdown">
                    <a href="#">About</a>
                    <div class="dropdown-content">
                        <a href="#"> Our Story</a>
                        <a href="#">Team</a>
                        <a href="#">Contact</a>
                    </div>
                    <li>
                        <a href="#">Products</a>
                    </li>
                    <li>
                        <button class="login-btn">Login</button>
                    </li>
                </li>
            </ul>
        </nav>
    </div>
</body>
</html>

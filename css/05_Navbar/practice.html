<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       body{
        font-family: Arial, Helvetica, sans-serif;
        background-color: #e35555;
        margin: 0;
        padding: 0px;
       }
       .nav-container{
        margin-bottom: 40px;
       }
       .nav1{
        color: cornsilk;
        padding: 10px;
        background-color: #f28d8d;
       }
       .nav1 ul{
        display: flex;
        justify-content: space-around;
        padding: 0;
        margin: 0;
        list-style-type: none;
       }
       .nav1 a{
        color: rgb(189, 4, 4);
        text-decoration: none;
        padding: 5px 15px;
        position: relative;
       }
       .nav1 a::after{
        content: "";
        position: absolute;
        height: 2px;
        width: 100%;
        left: 0;
        bottom: 0;
        background-color: #fff;
        transform: scaleX(0);
        transition: transform 0.3s ease-in-out;
       }
       .nav1 a:hover::after{
        transform: scaleX(1);
       }
    </style>
    
</head>
<body>
    <div class="nav-container">
        <nav class="nav1">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
                <li ><button class="login-btn">Login</button></li>
        </ul>
        </nav>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #e7ee59;
            color: cornsilk;
            margin: 0;
            padding: 0;
        }
        .nav2{
            background-color:#3d1a5b;
            width: 200px;
            padding: 20px;
            
        }
        .nav2 ul{
            list-style-type: none;
            margin: 0;
            padding: 0;
        }
        .nav2 li{
            margin-bottom: 12px;
        }
        .nav2 a{
            text-decoration: none;
            color: cornsilk;
            display: block;
            padding: 10px;
            width: 100%;
        }
        .nav2 a:hover{
            background-color: #8849e8;
        }
        .nav2 .Login-btn{
            background-color: #8e39f6;
            color: cornsilk;
            cursor: pointer;
            border: none;
            width: 100%;
            border-radius: 10px;
            padding: 10px;
        }
        .nav2 .Login-btn:hover{
            background-color: #4600a1;
            border: 1px solid cornsilk;
        }
    </style>
</head>
<body>
     <div class="nav-container">
        <nav class="nav2">
            <ul>
                <li><a href="#">Home</a>
                </li>
                <li><a href="#">about</a>
                </li>
                <li><a href="#">Products</a>
                </li>
                <li><button class="Login-btn">Login</button>
                </li>
            </ul>
        </nav>
    </div>
</body>
</html>

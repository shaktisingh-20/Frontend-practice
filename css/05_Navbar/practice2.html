<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f75757;
            color: cornsilk;
        }
        .nav{
            background-color: #720303;
            width: 200px;
            padding: 20px;
        }
        .nav ul{
            list-style-type: none;
            margin: 0;
            padding: 0;
        }
        .nav li{
            margin-bottom: 10px;
        }
        .nav a{
            display: block;
            text-decoration: none;
            color: cornsilk;
            padding: 10px;
            width: 100%;
        }
        .nav a:hover{
            background-color: #4f0505;
            border-radius: 8px;
            border: 1px solid rgb(85, 1, 1);
        }
        .nav .login-btn{
            border: none;
            background-color: #e3530c;
            padding: 10px;
            width: 100%;
            border-radius: 10px;cursor: pointer;
            color: cornsilk;
        }
        .nav .login-btn:hover{
            border:1px solid cornsilk;
            background-color: #c80808;
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <nav class="nav">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
                <li><button class="login-btn">Login</button></li>
            </ul>                  
        </nav>
    </div>
</body>
</html>

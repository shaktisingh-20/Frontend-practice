<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #ebda59;
            color: rgb(87, 51, 3);
            margin: 0;
            padding: 0;
        }
        .nav{
            width: 200px;
            padding: 20px;
            background-color: #73a702;
        }
        .nav ul{
            list-style-type: none;
            margin: 0;
            padding: 0;
        }
        .nav li{
            display: block;
            margin-bottom: 12px;
        }
        .nav a{
            display: block;
            text-decoration: none;
            color: aliceblue;
            padding: 10px;
            width: 100%;
        }.nav a:hover{
            background-color: #006e0f;
            border: 1px solid aliceblue;
            border-radius: 8px;
        }
        .nav .login-btn{
            width: 100%;
            padding: 10px;
            background-color: #0f5d0a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .nav .login-btn:hover{
            border: 2px solid aliceblue;
            border-radius: 8px;
            background-color: #006e0f;
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <nav class="nav">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
                <li><button class="login-btn">Login</button></li>
            </ul>                  
        </nav>
    </div>
</body>
</html>

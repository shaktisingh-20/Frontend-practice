<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>tables</title>
    <style>
        table{
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
        }
        tr:nth-child(even){
            background-color: #b9b9b9;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Country</th>
            <th>Country Code</th>
            <th>Email</th>
            <tr>
                <td>India</td>
                <td>In</td>
                <td>india@gov.in</td>
            </tr>
            <tr>
                <td>United States of America</td>
                <td>usa</td>
                <td>usa@gmail.com</td>
            </tr>
            <tr>
                <td>Japan</td>
                <td>JP</td>
                <td>japan@gmail.com</td>
            </tr>
        </tr>
    </table>
</body>
</html>
